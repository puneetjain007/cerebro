# Secret will be used to sign session cookies, CSRF tokens and for other encryption utilities.
# It is highly recommended to change this value before running cerebro in production.
secret = "ki:s:[[@=Ag?QI`W2jMwkY:eqvrJ]JqoJyi2axj3ZvOv^/KavOT4ViJSv?6YY4[N"

# Application base path
basePath = "/"

# Defaults to RUNNING_PID at the root directory of the app.
# To avoid creating a PID file set this value to /dev/null
#pidfile.path = "/var/run/cerebro.pid"
pidfile.path=/dev/null

# Rest request history max size per user
rest.history.size = 50 // defaults to 50 if not specified

# Path of local database file
#data.path: "/var/lib/cerebro/cerebro.db"
data.path = "./cerebro.db"

play {
  # Cerebro port, by default it's 9000 (play's default)
  server.http.port = ${?CEREBRO_PORT}
}

es = {
  gzip = true
}

# Operation restrictions
restrictions {
  # Set to true to enable read-only mode (only GET operations allowed)
  # All write operations (POST, PUT, DELETE) will be blocked
  read-only = false
  read-only = ${?CEREBRO_READ_ONLY}
}

# Authentication
auth = {
  # either basic, ldap, or oauth
  type: ${?AUTH_TYPE}
  settings {
    # LDAP
    url = ${?LDAP_URL}
    # OpenLDAP might be something like "ou=People,dc=domain,dc=com"
    base-dn = ${?LDAP_BASE_DN}
    # Usually method should  be "simple" otherwise, set it to the SASL mechanisms to try
    method = ${?LDAP_METHOD}
    # user-template executes a string.format() operation where
    # username is passed in first, followed by base-dn. Some examples
    #  - %s => leave user untouched
    #  - %s@domain.com => append "@domain.com" to username
    #  - uid=%s,%s => usual case of OpenLDAP
    user-template = ${?LDAP_USER_TEMPLATE}
    // User identifier that can perform searches
    bind-dn = ${?LDAP_BIND_DN}
    bind-pw = ${?LDAP_BIND_PWD}
    group-search {
      // If left unset parent's base-dn will be used
      base-dn = ${?LDAP_GROUP_BASE_DN}
      // Attribute that represent the user, for example uid or mail
      user-attr = ${?LDAP_USER_ATTR}
      // Define a separate template for user-attr
      // If left unset parent's user-template will be used
      user-attr-template = ${?LDAP_USER_ATTR_TEMPLATE}
      // Filter that tests membership of the group. If this property is empty then there is no group membership check
      // AD example => memberOf=CN=mygroup,ou=ouofthegroup,DC=domain,DC=com
      // OpenLDAP example => CN=mygroup
      group = ${?LDAP_GROUP}
    }

    # RBAC Configuration
    rbac {
      # Enable RBAC enforcement (default: false for backward compatibility)
      # When disabled, all authenticated users have full access (existing behavior)
      # When enabled, users are assigned roles based on their LDAP group membership
      enabled = false
      enabled = ${?CEREBRO_RBAC_ENABLED}

      # LDAP Group-to-Role Mapping
      # Maps LDAP group DNs to Cerebro roles (admin, editor, viewer)
      # Format: "ldap_group_dn=role;another_group_dn=role"
      # Example: "cn=cerebro-admins,ou=groups,dc=example,dc=com=admin;cn=cerebro-editors,ou=groups,dc=example,dc=com=editor;cn=cerebro-viewers,ou=groups,dc=example,dc=com=viewer"
      #
      # Role Permissions:
      #   admin  - Full access (cluster settings, delete indices, manage snapshots)
      #   editor - Create/update indices, templates, aliases, snapshots (no delete indices/repos, no cluster settings)
      #   viewer - Read-only access
      #
      # Multiple groups can map to the same role. Users inherit the union of all roles from their groups.
      role-mapping = ${?CEREBRO_RBAC_ROLE_MAPPING}

      # Default role for users not in any mapped group
      # Options: "none" (deny all writes), "viewer" (read-only), "editor", "admin"
      # Default: "none" (deny-by-default security model)
      # For safer rollout, consider setting to "viewer"
      default-role = "none"
      default-role = ${?CEREBRO_RBAC_DEFAULT_ROLE}
    }

    # Basic auth
    username = ${?BASIC_AUTH_USER}
    password = ${?BASIC_AUTH_PWD}

    # Proxy auth (nginx + oauth2-proxy in front of Cerebro)
    # Set auth.type = "proxy" to enable. Cerebro will trust headers set by the proxy
    # and skip its own login form / token validation entirely.
    #
    # Recommended nginx location block:
    #
    #   location / {
    #       auth_request /oauth2/auth;
    #       auth_request_set $user   $upstream_http_x_auth_request_user;
    #       auth_request_set $groups $upstream_http_x_auth_request_groups;
    #       auth_request_set $email  $upstream_http_x_auth_request_email;
    #       proxy_set_header X-Auth-Request-User   $user;
    #       proxy_set_header X-Auth-Request-Groups $groups;
    #       proxy_set_header X-Auth-Request-Email  $email;
    #       proxy_pass http://cerebro:9000;
    #   }
    #
    # Groups are mapped to roles (admin/editor/viewer) via auth.settings.rbac.role-mapping.
    # If the user header is missing, Cerebro redirects to /login.
    #
    # proxy {
    #   user-header   = "X-Auth-Request-User"    # env: CEREBRO_PROXY_USER_HEADER
    #   groups-header = "X-Auth-Request-Groups"  # env: CEREBRO_PROXY_GROUPS_HEADER
    #   email-header  = "X-Auth-Request-Email"   # env: CEREBRO_PROXY_EMAIL_HEADER (fallback username)
    #
    #   # SECURITY: restrict header trust to known nginx source IPs/CIDRs.
    #   # Requests from any other source are rejected even if headers are present.
    #   # Leave empty only if Cerebro is unreachable except from the proxy (firewall enforced).
    #   trusted-ips = ["10.0.0.1", "172.16.0.0/24"]  # env: CEREBRO_PROXY_TRUSTED_IPS (comma-separated)
    # }

    # OAuth / OIDC
    oauth {
      discovery-uri = ${?OAUTH_DISCOVERY_URI}
      client-id = ${?OAUTH_CLIENT_ID}
      client-secret = ${?OAUTH_CLIENT_SECRET}
      redirect-uri = ${?OAUTH_REDIRECT_URI}
      scopes = "openid profile email groups"
      scopes = ${?OAUTH_SCOPES}
      token-type = "id_token"
      token-type = ${?OAUTH_TOKEN_TYPE}
      claim-mapping = "groups"
      claim-mapping = ${?OAUTH_CLAIM_MAPPING}
      # Optional: explicit endpoints (override discovery)
      authorization-endpoint = ${?OAUTH_AUTH_ENDPOINT}
      token-endpoint = ${?OAUTH_TOKEN_ENDPOINT}
      jwks-uri = ${?OAUTH_JWKS_URI}
      issuer = ${?OAUTH_ISSUER}
      # File-based secrets (Docker secrets, Kubernetes secret volumes)
      # These take precedence over inline values when set.
      # Example: /run/secrets/oauth_client_id
      client-id-file = ${?OAUTH_CLIENT_ID_FILE}
      client-secret-file = ${?OAUTH_CLIENT_SECRET_FILE}
    }
  }
}

# Audit logging
audit {
  # Set to false to disable all audit output
  enabled = true
  enabled = ${?CEREBRO_AUDIT_ENABLED}

  # Paths excluded from audit (polling endpoints)
  excluded-paths = ["/overview", "/nodes", "/navbar", "/cluster_changes"]

  # Set to false to omit request body from audit events
  include-body = true
  include-body = ${?CEREBRO_AUDIT_INCLUDE_BODY}
}

