include "application"

auth {
  type: "oauth"
  settings {
    oauth {
      discovery-uri = "http://localhost:8888/default/.well-known/openid-configuration"
      # Secrets loaded from files instead of inline values
      client-id-file = "/tmp/cerebro-secrets/client-id"
      client-secret-file = "/tmp/cerebro-secrets/client-secret"
      redirect-uri = "http://localhost:9000/auth/callback"
      scopes = "openid profile email groups"
      token-type = "id_token"
      claim-mapping = "groups"
    }
    rbac {
      enabled = true
      role-mapping = "cerebro-admins=admin;cerebro-editors=editor;cerebro-viewers=viewer"
      default-role = "viewer"
    }
  }
}

hosts = [
  {
    host = "http://localhost:9200"
    name = "Local E2E Cluster"
  }
]
