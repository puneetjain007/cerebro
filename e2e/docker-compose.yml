version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-idp:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "8888:8888"
    environment:
      - SERVER_PORT=8888
      - JSON_CONFIG_PATH=/config/config.json
    volumes:
      - ./mock-idp-config.json:/config/config.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/default/.well-known/openid-configuration || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
